name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}        # manual run (no tag) to test signing — uploads an artifact

permissions:
  contents: write              # create the GitHub Release + upload assets

# Repository secrets for SIGNED + NOTARIZED builds. With NONE set, the workflow still
# produces an UNSIGNED .pkg + tarball so it never blocks. Set them together:
#
#   MACOS_CERT_APP_P12_BASE64        base64 of a .p12 holding ONLY the "Developer ID
#                                    Application" cert + its private key.
#   MACOS_CERT_INSTALLER_P12_BASE64  base64 of a .p12 holding ONLY the "Developer ID
#                                    Installer" cert + its private key.
#                                    (Two separate p12s: `security import` reliably binds
#                                    only one identity from a multi-identity p12, so the
#                                    app and installer certs must be imported separately —
#                                    the action's own documented multi-cert pattern.)
#   MACOS_CERT_PASSWORD              the export password (use the SAME one for both p12s)
#   DEVELOPER_ID_APP                 "Developer ID Application: <Name> (TEAMID)"
#   DEVELOPER_ID_INSTALLER           "Developer ID Installer: <Name> (TEAMID)"
#   NOTARY_KEY_P8_BASE64             base64 of the App Store Connect API key AuthKey_XXXX.p8
#   NOTARY_KEY_ID                    the API Key ID
#   NOTARY_ISSUER_ID                 the API Issuer ID (UUID)

jobs:
  release:
    runs-on: macos-15          # Sequoia: default Xcode 16 = Swift 6
    env:
      DEVELOPER_ID_APP: ${{ secrets.DEVELOPER_ID_APP }}
      DEVELOPER_ID_INSTALLER: ${{ secrets.DEVELOPER_ID_INSTALLER }}
      NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
      NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
      # Surfaced as env so step `if:`s can gate on them — `secrets` is not a valid
      # context inside an `if:` expression, but `env` is.
      MACOS_CERT_APP_P12_BASE64: ${{ secrets.MACOS_CERT_APP_P12_BASE64 }}
      MACOS_CERT_INSTALLER_P12_BASE64: ${{ secrets.MACOS_CERT_INSTALLER_P12_BASE64 }}
      NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 16 (Swift 6)
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC/Contents/Developer"; fi

      # --- Signing setup (skipped automatically when secrets are absent) ----------
      # Two single-identity p12s, imported in two steps. `security import` reliably
      # binds only ONE identity from a multi-identity p12 (verified on the runner: a
      # combined app+installer p12 yields just the Application identity), so the certs
      # MUST arrive separately. This is the action's own documented multi-certificate
      # pattern: the first call creates the temp keychain and emits its auto-generated
      # password; the second reuses it via create-keychain:false + keychain-password.
      # The action whitelists codesign + pkgbuild + productbuild + productsign, so
      # sign.sh (Developer ID Application) and make-pkg.sh (Developer ID Installer)
      # both find their identities downstream.
      - name: Import Developer ID Application cert
        id: app_cert
        if: ${{ env.MACOS_CERT_APP_P12_BASE64 != '' }}
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_APP_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}

      - name: Import Developer ID Installer cert
        if: ${{ env.MACOS_CERT_INSTALLER_P12_BASE64 != '' }}
        uses: apple-actions/import-codesign-certs@v7
        with:
          create-keychain: false
          keychain-password: ${{ steps.app_cert.outputs.keychain-password }}
          p12-file-base64: ${{ secrets.MACOS_CERT_INSTALLER_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}

      - name: Decode notarization key
        if: ${{ env.NOTARY_KEY_P8_BASE64 != '' }}
        env:
          P8_B64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          echo "$P8_B64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          # notarize.sh reads these; passing the key to notarytool directly avoids a
          # keychain-profile round-trip.
          echo "NOTARY_KEY_PATH=$RUNNER_TEMP/notary.p8" >> "$GITHUB_ENV"

      # --- Build → sign → pkg → notarize (each script no-ops if its vars are unset) -
      - name: Build universal sd
        run: bash scripts/build-universal.sh
      - name: Sign binary
        run: bash scripts/sign.sh
      - name: Build .pkg
        run: bash scripts/make-pkg.sh
      - name: Notarize + staple
        run: bash scripts/notarize.sh

      - name: Tarball + checksums
        run: |
          cd dist
          # Archive name keeps the `sod-` product prefix (matches the .pkg); the binary inside is `sd`.
          tar -czf "sod-${GITHUB_REF_NAME}-universal.tar.gz" sd
          shasum -a 256 sod-*.tar.gz sod-*.pkg > SHA256SUMS.txt

      - name: Publish GitHub Release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sod-*.pkg
            dist/sod-*-universal.tar.gz
            dist/SHA256SUMS.txt

      - name: Upload artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: sod-pkg
          path: |
            dist/sod-*.pkg
            dist/sod-*-universal.tar.gz
            dist/SHA256SUMS.txt
          if-no-files-found: ignore
