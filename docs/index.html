  :root{
    --bg: #000;

    /* terminal: a "sod" theme — grass green & soil brown on warm near-black */
    --term-bg:   #181510;
    --term-fg:   #d9d3c3;
    --t-green:   #8fce54;   /* grass — the prompt arrow */
    --t-cyan:    #b7d182;   /* light sage — the host */
    --t-blue:    #b18a57;   /* soil tan — git:( ) */
    --t-red:     #cf7a52;   /* clay — branch name */
    --t-yellow:  #d8a23f;   /* wheat — the ✗ */
    --t-dim:     #837a67;

    --grass:        #8fce54;
    --grass-deep:   #6fb23e;

    --mono: "JetBrains Mono Web", ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
    --radius: 14px;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; min-height:100%; }
  a{ color: inherit; text-decoration: none; }
  body{
    background: var(--bg);
    color: var(--term-fg);
    font-family: var(--mono);
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* Botanica Software Labs wordmark — top */
  .site-head{ display:flex; justify-content:center; padding: 42px 22px 0; }
  .site-head a{ display:block; opacity:.82; transition: opacity .15s ease; }
  .site-head a:hover{ opacity:1; }
  .bsl-mark{ width: 196px; height:auto; display:block; }
  .bsl-mark path, .bsl-mark rect{ fill: #e9ebef; }

  /* terminal + actions — centered in the space between header and footer */
  .wrap{ flex: 1 1 auto; width: 100%; max-width: 860px; margin: 0 auto;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 30px; padding: 46px 22px; }

  /* Botanica square mark — footer */
  .site-foot{ display:flex; justify-content:center; padding: 0 22px 42px; }
  .site-foot a{ display:block; opacity:.9; transition: opacity .15s ease; }
  .site-foot a:hover{ opacity:1; }
  .site-foot img{ width:56px; height:56px; display:block; border-radius:13px; }

  /* terminal */
  .terminal{
    width: 100%; position: relative; border-radius: var(--radius);
    background: var(--term-bg); border: 1px solid rgba(255,255,255,.10);
    box-shadow:
      0 0 0 1px rgba(0,0,0,.6),
      0 1px 0 rgba(255,255,255,.05) inset,
      0 40px 90px -30px rgba(0,0,0,.9);
    overflow: hidden; isolation: isolate;
  }
  .term-bar{
    height: 42px; display:flex; align-items:center; padding: 0 14px;
    background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.012));
    border-bottom: 1px solid rgba(255,255,255,.06); position: relative;
  }
  .lights{ display:flex; gap:8px; }
  .lights i{ width:12px; height:12px; border-radius:50%; display:block; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.35); }
  .lights .r{ background:#ff5f57; } .lights .y{ background:#febc2e; } .lights .g{ background:#28c840; }
  .term-title{
    position:absolute; left:50%; top:50%; transform: translate(-50%,-50%);
    display:flex; align-items:center; gap:8px;
    font-family: var(--mono); font-size: 13px; color: #cdc4af; white-space: nowrap; user-select:none;
  }
  .term-title img{ height: 16px; width:auto; display:block; }
  .term-title b{ font-weight:600; letter-spacing:.01em; }

  .term-body{
    font-family: var(--mono); font-size: 13.5px; line-height: 1.62;
    color: var(--term-fg); padding: 18px 20px 20px; height: 452px;
    overflow: hidden; position: relative;
  }
  .terminal::after{
    content:""; position:absolute; left:1px; right:1px; top:42px; height:24px;
    background: linear-gradient(180deg, var(--term-bg), transparent); pointer-events:none; z-index:2;
  }
  .line{ white-space: pre-wrap; word-break: break-word; opacity:0; transform: translateY(1px);
    transition: opacity .12s ease, transform .12s ease; }
  .line.show{ opacity:1; transform:none; }
  .line.gap{ height: .5em; }

  /* sod prompt colors */
  .g{ color: var(--t-green); } .c{ color: var(--t-cyan); } .bl{ color: var(--t-blue); }
  .r{ color: var(--t-red); } .y{ color: var(--t-yellow); } .b{ font-weight: 700; }
  .dim{ color: var(--t-dim); }

  .caret{
    display:inline-block; width: 8px; height: 1.05em; background: var(--term-fg);
    vertical-align: -2px; margin-left: 1px; animation: blink 1.05s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  /* Touch ID: the real macOS screenshot over a matching dim */
  .overlay{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background: rgba(24,21,16,.93);
    opacity:0; visibility:hidden; transition: opacity .26s ease, visibility .26s; z-index:10;
  }
  .overlay.show{ opacity:1; visibility:visible; }
  .ta-shot{
    height: min(82%, 430px); width:auto; max-width: 88%;
    transform: scale(.965); transition: transform .26s cubic-bezier(.2,.8,.3,1.1);
    filter: drop-shadow(0 20px 46px rgba(0,0,0,.5));
  }
  .overlay.show .ta-shot{ transform: scale(1); }

  /* actions — stacked under the terminal */
  .actions{ display:flex; flex-direction:column; align-items:center; gap:12px; }
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:9px;
    min-width: 232px; padding: 12px 22px; border-radius: 11px;
    font-family: var(--mono); font-size: 14px; font-weight:600; letter-spacing:.01em;
    cursor:pointer; transition: transform .12s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .btn:active{ transform: translateY(1px); }
  .btn-primary{
    color:#101206; border: 1px solid var(--grass-deep);
    background: linear-gradient(180deg, var(--grass), var(--grass-deep));
    box-shadow: 0 8px 22px -14px rgba(143,206,84,.42);
  }
  .btn-primary:hover{ box-shadow: 0 12px 26px -12px rgba(143,206,84,.58); }
  .btn-primary .sub{ font-weight:500; opacity:.62; }
  .btn-ghost{
    color: var(--term-fg); background: rgba(255,255,255,.02);
    border: 1px solid rgba(255,255,255,.16);
  }
  .btn-ghost:hover{ border-color: rgba(255,255,255,.30); background: rgba(255,255,255,.05); }
  .btn-ghost svg{ width:16px; height:16px; }

  @media (max-width: 720px){
    .term-body{ font-size: 12px; height: 430px; padding: 14px 14px 16px; }
    .wrap{ gap: 24px; }
  }
  @media (prefers-reduced-motion: reduce){
    .caret{ animation: none; }
    .overlay, .ta-shot, .line, .btn{ transition: none; }
  }
</style>

<script>
(function(){
  "use strict";

  var term    = document.getElementById('term');
  var overlay = document.getElementById('overlay');

  var REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var ONCE = /\bonce\b/.test(location.search + location.hash);  // recording mode: one pass, then signal

  // The real oh-my-zsh (robbyrussell) prompt from the cast, in the sod palette.
  var PROMPT      = '<span class="g b">\u279c</span>  <span class="c">alon</span> <span class="bl b">git:(</span><span class="r">main</span><span class="bl b">)</span> <span class="y">\u2717</span> ';
  var PROMPT_FAIL = PROMPT;
  var GAP = { gap: true };

  // Reconstructed from install.cast — real prompt, real commands, real output, real timing.
  var steps = [
    { type: PROMPT, text: 'sd install', after: 380 },
    { p: "The sod agent is running and will start at every login (serving id_sod)." },
    GAP,
    { p: "Point your shell at it:" },
    GAP,
    { p: "    echo 'export SSH_AUTH_SOCK=\"$HOME/.ssh/sod-agent.sock\"' >> ~/.zshrc" },
    { p: "    exec $SHELL", after: 850 },
    GAP,

    { type: PROMPT, text: "echo 'export SSH_AUTH_SOCK=\"$HOME/.ssh/sod-agent.sock\"' >> ~/.zshrc", speed: 13, after: 650 },
    GAP,

    { type: PROMPT, text: "exec $SHELL", after: 720 },
    GAP,

    { type: PROMPT, text: "ssh -T git@github.com", after: 700 },
    { touchid: true },
    { p: "Hi 0xa10! You've successfully authenticated, but GitHub does not provide shell access.", after: 550 },
    GAP,

    { p: PROMPT_FAIL + '<span class="caret"></span>', after: 3000 },
    { clear: true }
  ];

  function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

  function appendLine(html){
    var d = document.createElement('div'); d.className = 'line';
    if (html != null) d.innerHTML = html;
    term.appendChild(d);
    requestAnimationFrame(function(){ d.classList.add('show'); });
    term.scrollTop = term.scrollHeight;
    return d;
  }
  function appendGap(){ var d = document.createElement('div'); d.className = 'line gap show'; term.appendChild(d); return d; }
  function stripCarets(){ var c = term.querySelectorAll('.caret'); for (var i=0;i<c.length;i++) c[i].parentNode.removeChild(c[i]); }
  function clearTerm(){ term.innerHTML = ''; }

  async function typeCmd(prompt, text, speed){
    stripCarets();
    var line = appendLine(prompt);
    var caret = document.createElement('span'); caret.className = 'caret'; line.appendChild(caret);
    if (REDUCED){ caret.insertAdjacentText('beforebegin', text); caret.parentNode.removeChild(caret); return; }
    await sleep(240);
    var per = speed || 23;
    for (var i=0;i<text.length;i++){
      line.insertBefore(document.createTextNode(text[i]), caret);
      term.scrollTop = term.scrollHeight;
      await sleep(Math.max(8, per + (Math.random()*26 - 10)));
    }
    await sleep(190);
    caret.parentNode.removeChild(caret);
  }

  async function touchID(){
    overlay.setAttribute('aria-hidden','false');
    overlay.classList.add('show');
    await sleep(REDUCED ? 850 : 2300);   // the deliberate wait-for-finger pause
    overlay.classList.remove('show');
    overlay.setAttribute('aria-hidden','true');
    await sleep(REDUCED ? 80 : 360);
  }

  async function run(){
    if (ONCE){ while (!window.__go){ await sleep(30); } }   // recorder gates the start
    do {
      for (var i=0;i<steps.length;i++){
        var s = steps[i];
        if (s.type !== undefined && s.text !== undefined){ await typeCmd(s.type, s.text, s.speed); }
        else if (s.p !== undefined){ stripCarets(); appendLine(s.p); }
        else if (s.gap){ appendGap(); }
        else if (s.touchid){ await touchID(); }
        else if (s.clear){ if (ONCE){ window.__captureDone = true; return; } clearTerm(); }
        term.scrollTop = term.scrollHeight;
        var wait = (s.after != null) ? s.after : ((s.p !== undefined || s.gap) ? 40 : 0);
        await sleep(REDUCED ? 0 : wait);
      }
    } while (!REDUCED && !ONCE);
  }
  run();

  // Point "Download" straight at the latest .pkg when the GitHub API is reachable
  // (public repo, not behind the artifact CSP); otherwise the static href to the
  // releases/latest page stands.
  (function(){
    var dl = document.getElementById('dl');
    if (!dl || !window.fetch) return;
    fetch('https://api.github.com/repos/botanica-consulting/sod/releases/latest', { headers: { 'Accept': 'application/vnd.github+json' } })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(j){
        if (!j || !j.assets) return;
        var pkg = j.assets.filter(function(a){ return /\.pkg$/.test(a.name); })[0];
        if (pkg) dl.href = pkg.browser_download_url;
      })
      .catch(function(){});
  })();
})();
</script>
